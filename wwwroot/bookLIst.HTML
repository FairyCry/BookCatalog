        <ul id="bookList"></ul>

        <br>
        <div>
            <input type="text" id="search" placeholder="Введите запрос">

                <option value="Приключения">Приключения</option>
            </select>
            <button onclick="Search()">Поиск</button>

        </div> 
        <br><button onclick="window.location.href='index.HTML'">Вернуться</button>
